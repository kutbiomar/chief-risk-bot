<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Access — ChiefRiskBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="_shell.css"/>
  <link rel="stylesheet" href="_mvp.css"/>
  <script src="_shell.js" defer></script>
  <script src="_app.js" defer></script>
</head>
<body data-page="access" class="mvp-app-loading">
  <div class="app" id="app-root">
    <main>
      <div class="essay-hero compact">
        <div class="essay-meta"><span>Operations</span></div>
        <h1>Access</h1>
        <p class="essay-deck-hero">Manage workspace members, roles, and session activity.</p>
      </div>
      <div style="padding:0 max(32px,5vw) 64px">
        <div class="mvp-card" style="max-width:680px">
          <div class="mvp-card-header">
            <div>
              <div class="uplabel">Members</div>
              <h2>Workspace access</h2>
            </div>
          </div>
          <div class="mvp-card-body">
            <p style="color:var(--ink-soft);font-size:13px;line-height:1.6">
              Multi-user access management is planned for a future release.
              Currently this workspace supports one owner account.
              Contact support to transfer ownership or add an observer seat.
            </p>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
