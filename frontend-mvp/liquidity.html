<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Liquidity — ChiefRiskBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <link rel="stylesheet" href="/_shell.css"/>
  <link rel="stylesheet" href="_mvp.css"/>
  <script src="_shell.js" defer></script>
  <script src="_app.js" defer></script>
</head>
<body data-page="liquidity" class="mvp-app-loading">
  <div class="app" id="app-root">
    <main>
      <div class="mvp-page">
        <div class="mvp-hero">
          <div>
            <h1>Liquidity ladder</h1>
            <p>Expected inflows and outflows across the next 24 months, with a stress-case toggle and a configurable buffer target for the 90-day view.</p>
          </div>
          <div class="mvp-actions">
            <button id="liquidity-refresh" class="btn"><span class="ms">refresh</span>Refresh</button>
            <button id="liquidity-scenario" class="btn"><span class="ms">tornado</span>Stress case</button>
          </div>
        </div>
        <div id="liquidity-status" class="mvp-notice" hidden data-global-status></div>
        <div id="liquidity-kpis" class="mvp-grid cards-4"></div>
        <section class="mvp-card">
          <div class="mvp-card-header">
            <div>
              <div class="uplabel">Buffer</div>
              <h2>Projected monthly cash flows</h2>
            </div>
            <div class="mvp-actions">
              <label class="mvp-buffer-input">
                <span>Buffer target</span>
                <input id="liquidity-buffer" type="text" inputmode="numeric" value="2,000,000" data-format="integer"/>
              </label>
            </div>
          </div>
          <div class="mvp-card-body">
            <div id="liquidity-chart-summary" class="mvp-liquidity-summary"></div>
            <div id="liquidity-chart" class="mvp-liquidity-chart-wrap"></div>
          </div>
        </section>
        <div class="mvp-grid mvp-liquidity-lower-grid">
          <section class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Upcoming</div>
                <h2>Near-term pressure points</h2>
              </div>
            </div>
            <div class="mvp-card-body" id="liquidity-gaps"></div>
          </section>
          <section class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Cash Flow</div>
                <h2>Next 90 days</h2>
              </div>
            </div>
            <div class="mvp-card-body" id="liquidity-detail"></div>
          </section>
          <section class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Watchpoints</div>
                <h2>Operational read</h2>
              </div>
            </div>
            <div class="mvp-card-body" id="liquidity-notes"></div>
          </section>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
