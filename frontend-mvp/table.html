<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Positions — ChiefRiskBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <link rel="stylesheet" href="../frontend-design-ideal/_shell.css"/>
  <link rel="stylesheet" href="_mvp.css"/>
  <script src="_shell.js" defer></script>
  <script src="_app.js" defer></script>
</head>
<body data-page="table">
  <div class="app" id="app-root">
    <main>
      <div class="mvp-page">
        <div class="mvp-hero">
          <div>
            <h1>Positions</h1>
            <p>Your current portfolio positions. Add, edit, or remove holdings - each change creates a versioned snapshot.</p>
          </div>
          <div class="mvp-actions">
            <button id="new-position" class="btn primary"><span class="ms">add</span>New position</button>
          </div>
        </div>
        <div id="table-status" class="mvp-notice" hidden data-global-status></div>
        <div class="mvp-grid two">
          <section class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Current snapshot</div>
                <h2>Positions table</h2>
              </div>
              <div id="positions-meta" class="mvp-item-subtle"></div>
            </div>
            <div class="mvp-card-body" style="padding:0">
              <div class="mvp-table-wrap">
                <table class="mvp-table is-clickable">
                  <thead>
                    <tr>
                      <th>Ticker</th>
                      <th>Name</th>
                      <th>Factor Asset</th>
                      <th>Factor Sector</th>
                      <th>Subsector</th>
                      <th>Market Segment</th>
                      <th>Country</th>
                      <th>Region</th>
                      <th>Tag Source</th>
                      <th>Confidence</th>
                    </tr>
                  </thead>
                  <tbody id="positions-body"></tbody>
                </table>
              </div>
            </div>
          </section>
          <section class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Editor</div>
                <h2 id="position-form-title">Add position</h2>
              </div>
            </div>
            <div class="mvp-card-body">
              <form id="position-form" class="mvp-form">
                <div class="mvp-form-grid">
                  <div class="mvp-field">
                    <label for="form-ticker">Ticker</label>
                    <input id="form-ticker" required/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-name">Name</label>
                    <input id="form-name"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-quantity">Quantity</label>
                    <input id="form-quantity" type="number" step="0.01" required/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-market-value">Market value USD</label>
                    <input id="form-market-value" type="number" step="0.01" required/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-asset-class">Asset class</label>
                    <select id="form-asset-class">
                      <option value="public_equity">Public Equity</option>
                      <option value="fixed_income">Fixed Income</option>
                      <option value="private_equity">Private Equity</option>
                      <option value="real_assets">Real Assets</option>
                      <option value="real_estate">Real Estate</option>
                      <option value="cash">Cash &amp; Equivalents</option>
                      <option value="alternative">Alternative</option>
                    </select>
                  </div>
                  <div class="mvp-field">
                    <label for="form-region">Geo region</label>
                    <input id="form-region"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-sector">Sector</label>
                    <input id="form-sector"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-segment">Market segment</label>
                    <input id="form-segment"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-custodian">Custodian</label>
                    <input id="form-custodian"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-factor-asset-class">Factor asset class</label>
                    <input id="form-factor-asset-class"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-factor-sector">Factor sector</label>
                    <input id="form-factor-sector"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-factor-subsector">Factor subsector</label>
                    <input id="form-factor-subsector"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-factor-market-segment">Factor market segment</label>
                    <input id="form-factor-market-segment"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-factor-country">Factor country</label>
                    <input id="form-factor-country"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-factor-region">Factor region</label>
                    <input id="form-factor-region"/>
                  </div>
                  <div class="mvp-field">
                    <label for="form-factor-tag-source">Tag source</label>
                    <select id="form-factor-tag-source">
                      <option value="">Unset</option>
                      <option value="manual">manual</option>
                      <option value="extracted">extracted</option>
                      <option value="inferred">inferred</option>
                    </select>
                  </div>
                  <div class="mvp-field">
                    <label for="form-factor-tag-confidence">Tag confidence</label>
                    <input id="form-factor-tag-confidence" type="number" min="0" max="1" step="0.01"/>
                  </div>
                </div>
                <div class="mvp-field">
                  <label for="form-notes">Notes</label>
                  <textarea id="form-notes" rows="4"></textarea>
                </div>
                <div class="mvp-form-actions">
                  <button id="delete-position" class="btn" type="button" disabled><span class="ms">delete</span>Delete</button>
                  <button class="btn primary" type="submit"><span class="ms">save</span>Save</button>
                </div>
              </form>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
