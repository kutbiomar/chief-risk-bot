<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Briefings — ChiefRiskBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="_tokens.css"/>
  <link rel="stylesheet" href="_shell.css"/>
  <link rel="stylesheet" href="_mvp.css"/>
  <script src="_shell.js" defer></script>
  <script src="_app.js" defer></script>
</head>
<body data-page="briefings" class="mvp-app-loading">
  <div class="app" id="app-root">
    <main>
      <div class="essay-hero compact">
        <div class="essay-meta"><span>Analysis</span></div>
        <h1>Briefings</h1>
        <p class="essay-deck-hero">Weekly AI-generated risk memos for your investment committee. Generate a new briefing or review a prior one.</p>
        <div class="essay-actions">
          <button id="generate-briefing-action" class="btn primary"><span class="ms">add</span>Generate briefing</button>
        </div>
      </div>
      <div class="mvp-page">
        <div id="briefings-status" class="mvp-notice" hidden data-global-status></div>
        <div class="mvp-grid two">
          <div id="briefings-overview"></div>
          <div id="briefings-rail"></div>
        </div>
        <div class="mvp-actions">
          <button id="toggle-drafts" class="btn" type="button">Show drafts</button>
        </div>
        <div id="briefings-list" class="mvp-grid two mvp-briefings-list"></div>
      </div>
    </main>
  </div>
</body>
</html>
