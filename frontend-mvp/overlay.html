<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Internal Risk Signals — ChiefRiskBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="_shell.css?v=20260425e"/>
  <link rel="stylesheet" href="_mvp.css?v=20260425e"/>
  <script src="_shell.js" defer></script>
  <script src="_app.js?v=20260425e" defer></script>
</head>
<body data-page="overlay" class="mvp-app-loading">
  <div class="app" id="app-root">
    <main>
      <div class="essay-hero compact">
        <div class="essay-meta"><span>Diagnostics</span></div>
        <h1>Internal risk signals</h1>
        <p class="essay-deck-hero">This page is retained for internal diagnostics and model review. It is not part of the primary MVP user flow.</p>
        <div class="essay-actions">
          <button id="overlay-refresh" class="btn"><span class="ms">refresh</span>Refresh</button>
          <button id="overlay-run" class="btn primary"><span class="ms">orbit</span>Run overlay</button>
        </div>
      </div>
      <div class="mvp-page">
        <div id="overlay-status" class="mvp-notice" hidden data-global-status></div>
        <div id="overlay-feature"></div>
        <div id="overlay-kpis" class="mvp-grid cards-4"></div>
        <div class="mvp-grid two">
          <section class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Regime</div>
                <h2>Trigger conditions</h2>
              </div>
            </div>
            <div class="mvp-card-body" id="overlay-regime-panel"></div>
          </section>
          <section class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Exposure</div>
                <h2>Exposure map</h2>
              </div>
            </div>
            <div class="mvp-card-body" id="overlay-triangulation-panel"></div>
          </section>
        </div>
        <section class="mvp-card">
          <div class="mvp-card-header">
            <div>
              <div class="uplabel">Factors</div>
              <h2>Factor diagnostics</h2>
            </div>
          </div>
          <div class="mvp-card-body" id="overlay-factors-panel"></div>
        </section>
        <section class="mvp-card">
          <div class="mvp-card-header">
            <div>
              <div class="uplabel">Stress</div>
              <h2>Scenario impacts</h2>
            </div>
          </div>
          <div class="mvp-card-body" id="overlay-stress-panel"></div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
