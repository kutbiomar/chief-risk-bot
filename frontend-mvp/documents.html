<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Documents — ChiefRiskBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="_shell.css"/>
  <link rel="stylesheet" href="_mvp.css"/>
  <script src="_shell.js" defer></script>
  <script src="_app.js" defer></script>
</head>
<body data-page="documents" class="mvp-app-loading">
  <div class="app" id="app-root">
    <main>
      <div class="essay-hero compact" style="text-align:left;padding-left:max(32px,5vw);padding-right:max(32px,5vw)">
        <div class="essay-meta" style="justify-content:flex-start"><span>Operations</span></div>
        <h1 style="text-align:left;margin-left:0;font-size:clamp(28px,4vw,40px)">Documents</h1>
        <p class="essay-deck-hero" style="margin-left:0;font-size:16px">Upload custodian statements and fund reports. ChiefRiskBot extracts positions and maps them to your portfolio.</p>
      </div>
      <div style="padding:0 max(32px,5vw) 64px">
        <div id="documents-status" class="mvp-notice" hidden data-global-status></div>
        <div id="documents-summary" class="mvp-grid cards-4" style="margin-bottom:20px"></div>
        <div class="mvp-grid sidebar">
          <aside class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Folders</div>
                <h3>Library</h3>
              </div>
            </div>
            <div id="document-folders" class="mvp-split-list"></div>
          </aside>
          <section class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Upload</div>
                <h2>Documents</h2>
              </div>
            </div>
            <div class="mvp-card-body">
              <form id="upload-document-form" class="mvp-form">
                <div class="mvp-form-grid">
                  <div class="mvp-field">
                    <label for="upload-document-folder">Folder</label>
                    <select id="upload-document-folder">
                      <option value="custodian_statements">custodian_statements</option>
                      <option value="capital_calls">capital_calls</option>
                      <option value="distribution_notices">distribution_notices</option>
                      <option value="private_equity">private_equity</option>
                      <option value="real_estate">real_estate</option>
                    </select>
                  </div>
                  <div class="mvp-field">
                    <label for="upload-document-file">File</label>
                    <div class="mvp-dropzone" data-file-dropzone data-input-id="upload-document-file">
                      <input id="upload-document-file" type="file" accept=".pdf,.docx,.xlsx"/>
                      <div class="mvp-dropzone-copy">
                        <span class="ms">upload</span>
                        <div>
                          <div class="mvp-dropzone-title">Drop document here</div>
                          <div class="mvp-dropzone-meta">or click to browse `.pdf`, `.docx`, or `.xlsx`</div>
                        </div>
                      </div>
                      <div class="mvp-dropzone-selected" data-file-selected>No file selected</div>
                    </div>
                  </div>
                </div>
                <div class="mvp-form-actions" style="justify-content:flex-start">
                  <button class="btn primary" type="submit"><span class="ms">upload</span>Upload &amp; parse</button>
                  <button id="parse-document" class="btn" type="button"><span class="ms">analytics</span>Parse</button>
                  <button id="save-document-review" class="btn" type="button"><span class="ms">fact_check</span>Save review</button>
                  <button id="approve-document" class="btn" type="button"><span class="ms">task_alt</span>Approve into portfolio</button>
                </div>
              </form>
              <div class="mvp-field" style="margin-top:16px">
                <label for="document-tag-input">Tag selected document</label>
                <input id="document-tag-input" placeholder="imported"/>
              </div>
              <div class="mvp-form-actions" style="justify-content:flex-start;margin-top:12px">
                <button id="save-document-tag" class="btn" type="button"><span class="ms">sell</span>Save tag</button>
                <button id="delete-document" class="btn" type="button"><span class="ms">delete</span>Delete</button>
              </div>
              <div id="documents-list" class="mvp-split-list" style="margin-top:18px"></div>
            </div>
          </section>
          <aside class="mvp-card">
            <div class="mvp-card-header">
              <div>
                <div class="uplabel">Preview</div>
                <h3>Review queue</h3>
              </div>
            </div>
            <div class="mvp-card-body mvp-doc-preview" id="document-preview"></div>
          </aside>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
