name: ChiefRiskBot CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: chiefriskbot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run backend tests
        run: |
          pytest backend/tests -q

      - name: JS syntax checks
        run: |
          node --check frontend-mvp/_app.js
          node --check frontend-mvp/_shell.js

  migration_guard:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Enforce migration safety policy
        run: python scripts/check_destructive_migrations.py

      - name: Migration dry-run
        env:
          DATABASE_URL: postgresql+psycopg://chiefriskbot:chiefriskbot@localhost:5432/chiefriskbot
        run: |
          alembic upgrade head --sql > /tmp/migration.sql
          test -s /tmp/migration.sql

  build_backend:
    runs-on: ubuntu-latest
    needs: [migration_guard]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t chiefriskbot-api:${{ github.sha }} .

  deploy_staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    needs: [build_backend]
    environment: 24April26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend to Fly staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
        run: |
          flyctl deploy --remote-only --app "$FLY_APP_NAME" --config fly.toml

      - name: Deploy frontend to Cloudflare Pages staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          npx wrangler pages deploy frontend-mvp --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch staging

  deploy_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    needs: [deploy_staging]
    environment: 24April26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend to Fly production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
        run: |
          flyctl deploy --remote-only --app "$FLY_APP_NAME" --config fly.toml

      - name: Deploy frontend to Cloudflare Pages production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          npx wrangler pages deploy frontend-mvp --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch main
