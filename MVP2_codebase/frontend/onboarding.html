<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Onboarding — ChiefRiskBot MVP2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="_mvp.css"/>
  <script src="_app.js" defer></script>
</head>
<body data-page="onboarding">
  <div class="app-shell" id="app-shell">
    <main class="content">
      <div class="hero">
        <div>
          <h2>Start with the data you already have</h2>
          <p>Enter one fund and one upcoming capital call first. The product should be useful before any AI extraction exists.</p>
        </div>
      </div>
      <div id="onboarding-status" class="notice" hidden></div>
      <div class="grid two">
        <section class="card">
          <div class="card-header">
            <h3>Create Your First Fund</h3>
            <p>Minimal fund and commitment setup.</p>
          </div>
          <div class="card-body">
            <form id="fund-form" class="form">
              <div class="form-grid">
                <div class="field"><label for="fund-name">Fund Name</label><input id="fund-name" required/></div>
                <div class="field"><label for="manager-name">Manager</label><input id="manager-name" required/></div>
                <div class="field">
                  <label for="fund-type">Type</label>
                  <select id="fund-type">
                    <option value="PE">Private Equity</option>
                    <option value="VC">Venture Capital</option>
                    <option value="HF">Hedge Fund</option>
                    <option value="RE">Real Estate</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="field">
                  <label for="fund-currency">Currency</label>
                  <select id="fund-currency">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="CHF">CHF</option>
                    <option value="GBP">GBP</option>
                  </select>
                </div>
                <div class="field"><label for="fund-jurisdiction">Jurisdiction</label><input id="fund-jurisdiction"/></div>
                <div class="field"><label for="commitment-amount">Commitment</label><input id="commitment-amount" type="number" min="0" step="0.01" required/></div>
              </div>
              <button class="btn primary" type="submit">Create Fund</button>
            </form>
          </div>
        </section>
        <section class="card">
          <div class="card-header">
            <h3>Record An Upcoming Call</h3>
            <p>This seeds the first liquidity ladder and alert.</p>
          </div>
          <div class="card-body">
            <form id="call-form" class="form">
              <div class="form-grid">
                <div class="field"><label for="call-fund">Fund Name</label><input id="call-fund" placeholder="North Lake PE I"/></div>
                <div class="field"><label for="call-amount">Call Amount</label><input id="call-amount" type="number" min="0" step="0.01" required/></div>
                <div class="field"><label for="call-date">Due Date</label><input id="call-date" type="date"/></div>
              </div>
              <button class="btn secondary" type="submit">Record Capital Call</button>
            </form>
          </div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
