<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Briefings — ChiefRiskBot MVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<body data-page="briefings">
  <div class="app" id="app-root">
    <main>
      <div class="mvp-page">
        <div class="mvp-hero">
          <div>
            <h1>Briefings</h1>

          </div>
          <div class="mvp-actions">
            <button id="generate-briefing-action" class="btn primary"><span class="ms">add</span>Generate briefing</button>
          </div>
        </div>
        <div id="briefings-status" class="mvp-notice" hidden data-global-status></div>
        <div id="briefings-list" class="mvp-grid two"></div>
      </div>
    </main>
  </div>
