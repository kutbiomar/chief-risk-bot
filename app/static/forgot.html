<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reset password — ChiefRiskBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet"/>
<link rel="stylesheet" href="_shell.css"/>
<style>
  body{min-height:100vh;display:flex;flex-direction:column}
  .top{height:64px;border-bottom:1px solid var(--rule);display:flex;align-items:center;padding:0 32px;background:var(--paper)}
  .top .logo{width:30px;height:30px;border-radius:6px;background:var(--accent);color:#fff;display:grid;place-items:center;font-family:'Fraunces';font-weight:900;font-size:15px;margin-right:10px}
  .top b{font-family:'Fraunces';font-weight:900;font-size:17px}
  .stage{flex:1;display:grid;place-items:center;padding:48px 24px}
  .panel{max-width:440px;width:100%;border:1px solid var(--rule);background:#fffdfb;border-radius:8px;box-shadow:var(--shadow);padding:40px 44px}
  .eyebrow{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  h1{font-family:'Fraunces';font-weight:900;font-size:32px;letter-spacing:-.02em;line-height:1.05;margin:0 0 10px}
  .lede{margin:0 0 22px;color:var(--ink-soft);font-size:13px;line-height:1.55}
  form{display:flex;flex-direction:column;gap:14px}
  .btn.primary{justify-content:center;padding:12px;font-size:13px}
  .legal{margin-top:24px;padding-top:18px;border-top:1px solid var(--rule);font-size:11px;color:var(--ink-mute);text-align:center}
  .legal a{color:var(--accent);font-weight:600}
  .sent{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1px solid #cfe1d3;background:var(--good-bg);border-radius:6px;margin-bottom:18px}
  .sent .ms{color:var(--good-fg);font-size:20px}
  .sent b{display:block;font-size:12px;color:var(--good-fg);margin-bottom:2px}
  .sent small{font-size:11px;color:var(--ink-soft);line-height:1.5}
</style></head>
<body>
  <div class="top"><div class="logo">C</div><b>ChiefRiskBot</b></div>
  <div class="stage">
    <div class="panel">
      <div class="eyebrow">Account recovery</div>
      <h1 class="serif">Reset your password.</h1>
      <p class="lede">Enter the email associated with your workspace. We'll send a reset link valid for 30 minutes. SSO accounts should reset through their identity provider.</p>
      <form>
        <div class="field">
          <label>Work email</label>
          <input type="email" placeholder="omar@aldridge.fo" autocomplete="email"/>
        </div>
        <button class="btn primary" type="submit">Send reset link <span class="ms">arrow_forward</span></button>
      </form>
      <div class="legal">
        Remembered it? <a href="login.html">Back to sign in</a>
      </div>
    </div>
  </div>
</body></html>
